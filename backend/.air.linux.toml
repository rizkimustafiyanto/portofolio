root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -buildvcs=false -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"

  include_ext = ["go", "tpl", "tmpl", "html"]

  exclude_dir = [
    "tmp",
    "vendor",
    "testdata"
  ]

  delay = 1000

  stop_on_error = true

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"
